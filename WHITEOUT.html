<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> universe 5 / WHITEOUT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="border-frame">
          <img src="assets/line.png" class="border-frame" alt="line">
        </div>
      
              <section class="screen active" id="idleScreen">
                  <div class="title-container">
                      <div class="scenario-title-sub">
                          <p class="universe-num">universe 5</p>
                          <h2 class="scenario-name">WHITEOUT</h2>
                      </div>
                  </div>
      
                  <div class="status-bar">
                      <div class="heart-container">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                          <img src="assets/heart_full.png" alt="Heart" class="heart">
                      </div>
                  </div>
      
                  <div class="result-card">
                      <p class="card-title">You are..</p>
                      <div class="card-avatar">
                          <img src="assets/pawn.png" alt="Player Icon">
                      </div>
                      <h3 class="picked-name">Player 3</h3>
                      <p class="card-desc">
                          Now you became this person. Whenever you face the decision refer to this person's personality and perspectives to make a decision.
                      </p>
                  </div>
                     
                  <div class="card-pull-zone">
                      <div class="card-deck">
                          <img src="assets/sc.png" class="card-left" alt="Scenario card">
                          <img src="assets/sc-center.png" class="card-center" alt="Scenario card">
                          <img src="assets/sc.png" class="card-right" alt="Scenario card">
                      </div>
                  </div>
      
              </section>
    </div>

</body>
</html>
